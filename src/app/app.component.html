<main class="flex flex-col align-center justify-center gap-l py-x">
	<app-theme></app-theme>

	<section>
		<div class="content">
			<div class="relative flex gap-n searcher">
				<input
					type="text"
					placeholder="User"
					class="btn block searcher__input"
					[ngClass]="{ alert: isEmpty }"
					required
					autofocus
					[(ngModel)]="txtUser"
					(keyup.enter)="getUser()"
				/>
				<small *ngIf="isEmpty" class="absolute bottom-0 ml-n searcher__alert">
					should fill in the field
				</small>

				<input
					type="submit"
					value="Search"
					(click)="getUser()"
					class="btn btn-primary"
				/>
			</div>
		</div>
	</section>

	<section>
		<div class="content">
			<ng-container *ngIf="isError">
				<app-error-message
					[errors]="errors"
					[isError]="isError"
				></app-error-message>
			</ng-container>

			<section class="lg-flex gap-m">
				<!-- NOTE: User details -->
				<app-user-details [githubUser]="githubUser"></app-user-details>

				<!-- NOTE: Favorites table -->
				<app-favorite-users
					[topRepositories]="topRepositories"
				></app-favorite-users>
			</section>
		</div>
	</section>
</main>
