<section class="mb-l">
	<div class="p-l txt-center favorites">
		<h2 class="my-n favorites__caption">Repositories with the most stars</h2>

		<div class="">
			<ng-container *ngIf="topRepositories.length <= 0">
				<div class="py-n favorites__empty">
					<p class="">No repositories</p>
				</div>
			</ng-container>

			<ng-container *ngFor="let repository of topRepositories">
				<article
					[id]="repository.node_id"
					class="p-n mb-n ml-auto mr-auto favorites__card"
				>
					<header class="mb-s">
						<h3>{{ repository.name | titlecase }}</h3>
					</header>

					<div>
						<p class="favorites__description">{{ repository.description }}</p>

						<footer class="pt-n">
							<p>
								<a
									[href]="repository.html_url"
									title="Repositories"
									target="_blank"
									class="link"
								>
									<span class="icon cross-center">
										<svg class="svg-icon">
											<use href="/assets/icons/icons.svg#github"></use>
										</svg>
									</span>
								</a>
							</p>

							<p class="pt-n in-flex gap-s">
								<span class="favorites__star">
									<span class="icon cross-center">
										<svg class="svg-icon">
											<use href="/assets/icons/icons.svg#star-fill"></use>
										</svg>
									</span>
								</span>
								<span>{{ repository.stargazers_count }}</span>
							</p>
						</footer>
					</div>
				</article>
			</ng-container>
		</div>
	</div>
</section>
